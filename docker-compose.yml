version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: dataplatform-postgres
    environment:
      POSTGRES_DB: dataplatform
      POSTGRES_USER: dataplatform
      POSTGRES_PASSWORD: dataplatform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataplatform -d dataplatform"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
