spring:
  application:
    name: consumer-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dataplatform}
    username: ${DB_USERNAME:dataplatform}
    password: ${DB_PASSWORD:dataplatform}
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  aws:
    region: ${AWS_REGION:us-east-1}
    endpoint-override: ${AWS_ENDPOINT_OVERRIDE:}
    data-lake-bucket: ${DATA_LAKE_BUCKET:data-platform-lake}
    retry-queue-url: ${RETRY_QUEUE_URL:}
    dlq-queue-url: ${DLQ_QUEUE_URL:}
  kcl:
    stream-name: ${KINESIS_STREAM_NAME:payment-events-stream}
    application-name: ${KCL_APPLICATION_NAME:payment-processor-app}
    worker-id: ${KCL_WORKER_ID:}
  processing:
    max-attempts: ${MAX_ATTEMPTS:5}
  schema:
    path: ${SCHEMA_PATH:shared/schemas/payment/v1.json}
