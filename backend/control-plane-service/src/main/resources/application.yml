server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: control-plane-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dataplatform}
    username: ${DB_USERNAME:dataplatform}
    password: ${DB_PASSWORD:dataplatform}
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI:https://example.invalid}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  aws:
    region: ${AWS_REGION:us-east-1}
    endpoint-override: ${AWS_ENDPOINT_OVERRIDE:}
    retry-queue-url: ${RETRY_QUEUE_URL:}
    dlq-queue-url: ${DLQ_QUEUE_URL:}
    kinesis-stream-name: ${KINESIS_STREAM_NAME:payment-events-stream}
    data-lake-bucket: ${DATA_LAKE_BUCKET:data-platform-lake}
  replay:
    max-records: ${MAX_REPLAY_RECORDS:1000}
  processing:
    max-attempts: ${MAX_ATTEMPTS:5}
  security:
    enabled: ${SECURITY_ENABLED:false}
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
